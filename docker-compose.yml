services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kmm_web_db}
      POSTGRES_USER: ${POSTGRES_USER:-kmm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password_here}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kmm_user} -d ${POSTGRES_DB:-kmm_web_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./
    command: uv run python manage.py runserver 0.0.0.0:8000
    entrypoint: []
    volumes:
      - .:/app
      - venv_data:/app/.venv
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kmm_user}:${POSTGRES_PASSWORD:-changeme_secure_password_here}@postgres:5432/${POSTGRES_DB:-kmm_web_db}
      REDIS_URL: redis://redis:6379/0
      VITE_DEV_MODE: "True"
      VITE_DEV_SERVER_URL: "http://localhost:5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Vite dev server for hot-reloading frontend (JS/CSS/TS + Tailwind)
  vite:
    build: ./
    entrypoint: []
    working_dir: /app/vite/src
    command: sh -c "npm ci --prefer-offline --no-audit --progress=false 2>/dev/null || npm install --prefer-offline --no-audit --progress=false; npm run dev"
    volumes:
      - .:/app
      # Anonymous volume to keep container's node_modules (prevents host overlay issues)
      - /app/vite/src/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  venv_data: