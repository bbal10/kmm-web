<form id="password-reset-form-container"
      method="post"
      class="space-y-4"
      hx-post="{% url 'data_management:password_reset' %}"
      hx-target="#password-reset-form-container"
      hx-swap="outerHTML"
      hx-indicator="#reset-spinner">
    {% csrf_token %}

    {% if form.errors %}
        <div class="border-l-4 border-block-rose bg-block-rose/10 p-3">
            <p class="text-sm font-semibold text-block-rose">
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}{{ error }}{% endfor %}
                {% endfor %}
            </p>
        </div>
    {% endif %}

    {% if success_message %}
        <div class="border-l-4 border-block-green bg-block-green/10 p-3">
            <p class="text-sm font-semibold text-block-green">
                {{ success_message }}
            </p>
        </div>
    {% endif %}

    <div class="motion-fade-up">
        <label for="{{ form.email.id_for_label }}" class="block-label">
            <i class="fas fa-envelope mr-1"></i>Alamat Email
        </label>
        <input
                id="{{ form.email.id_for_label }}"
                name="{{ form.email.name }}"
                type="email"
                required
                class="block-input"
                placeholder="nama@email.com"
                value="{{ form.email.value|default_if_none:'' }}"
        >
    </div>

    <button
            type="submit"
            class="block-btn-cta w-full py-2.5 text-sm relative cursor-pointer motion-press"
    >
        <svg id="reset-spinner" class="htmx-indicator h-4 w-4 text-white animate-spin absolute left-3 top-1/2 -translate-y-1/2"
             xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <i class="fas fa-paper-plane mr-2 htmx-indicator:hidden"></i>
        <span class="htmx-indicator:hidden">Kirim Link Reset Password</span>
    </button>
</form>
