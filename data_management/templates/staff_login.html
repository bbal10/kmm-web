{% extends 'base.html' %}
{% load static %}
{% block title %}Login Staff - KMM Mesir{% endblock %}
{% block wrapper %}
<div class="min-h-screen flex items-center justify-center bg-bg p-4 relative overflow-hidden">
  <!-- Subtle vibrant background glow (Amber/Orange for Staff) -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-warning-300 rounded-full blur-[100px] opacity-20 pointer-events-none"></div>
  
  <div class="w-full max-w-md motion-fade-up relative z-10">
    <div class="block-card p-8 sm:p-10 shadow-xl border-white/50 bg-white/80 backdrop-blur-xl">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-gradient-to-br from-warning-500 to-warning-600 shadow-lg shadow-warning-500/30 mx-auto flex items-center justify-center rounded-2xl mb-6">
          <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
          </svg>
        </div>
        <h1 class="text-3xl font-extrabold text-text-primary tracking-tight font-sans">Staff Portal</h1>
        <p class="mt-2 text-sm text-text-muted font-medium">Masuk ke sistem pengurus KMM Mesir</p>
      </div>
      
      <div id="staff-login-form-container">
        {% include 'partials/staff_login_form.html' %}
      </div>
    </div>
    
    <p class="text-center text-sm text-text-muted mt-8 font-medium">&copy; 2026 KMM MESIR</p>
  </div>
</div>
{% endblock wrapper %}
