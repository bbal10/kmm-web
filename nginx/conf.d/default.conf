# =============================================================================
# Nginx Server Block for KMM Web (Production)
# =============================================================================
# Untuk menghubungkan domain:
#   1. Ubah `server_name` di bawah menjadi domain kamu
#   2. Arahkan DNS A record domain ke IP server ini
#   3. Set ALLOWED_HOSTS=yourdomain.com,www.yourdomain.com di file .env
#   4. Jalankan ulang: docker compose -f docker-compose.prod.yml up -d
#
# Contoh:
#     server_name kmm-mesir.org www.kmm-mesir.org;
#
# ⚠️  PENTING - SSL / HTTPS:
# Karena production.py menggunakan SECURE_SSL_REDIRECT = True,
# aplikasi akan redirect ke HTTPS.
#
# Cara termudah:
#   - Gunakan Cloudflare (Flexible SSL / Full)
#   - Atau setup Let's Encrypt (lihat ssl.conf.example)
#
# Untuk setup awal tanpa SSL, kamu bisa sementara set di .env:
#   SECURE_SSL_REDIRECT=False
# (jangan lupa kembalikan ke True setelah punya HTTPS)
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    # Change this to your domain for production
    server_name _;   # _ = catch-all. Replace with: yourdomain.com www.yourdomain.com;

    # Max upload size
    client_max_body_size 20M;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files - served directly by nginx
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Handle missing files
        try_files $uri $uri/ =404;
    }

    # Media files - user uploads
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;

        # Handle missing files
        try_files $uri $uri/ =404;
    }

    # Health check endpoint (no rate limit)
    location ~ ^/(health|ready|alive)/ {
        access_log off;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Admin interface - rate limited
    location /admin/ {
        limit_req zone=auth burst=5 nodelay;
        limit_conn addr 10;

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # All other requests to Django
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 20;

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

