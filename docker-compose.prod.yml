services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kmm_web_db}
      POSTGRES_USER: ${POSTGRES_USER:-kmm_user}
      # Wajib diset di .env — gagal cepat dengan pesan jelas bila kosong,
      # supaya tidak diam-diam memakai password kosong.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    # Expose only for debugging / direct DB access from host (remove in high-security setups)
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kmm_user} -d ${POSTGRES_DB:-kmm_web_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # Expose only for debugging (remove in production if not needed)
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./
    # Production WSGI server - only exposed internally to nginx
    command: uv run gunicorn kmm_web_backend.wsgi:application --bind 0.0.0.0:8000 --workers 4
    expose:
      - "8000"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kmm_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-kmm_web_db}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: "kmm_web_backend.settings.production"
      VITE_DEV_MODE: "False"
    volumes:
      # Share media (user uploads) and staticfiles with nginx
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Liveness endpoint from data_management.health_checks (no DB dependency)
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/alive/', timeout=5).status==200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # Nginx reverse proxy - serves on standard ports 80/443
  # This allows clean domain access (yourdomain.com instead of :8080)
  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Read-only access to static and media files
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: