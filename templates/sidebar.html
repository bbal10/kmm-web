<div id="sidebar-backdrop" class="fixed inset-0 z-20 bg-text-primary/40 hidden md:hidden cursor-pointer backdrop-blur-sm transition-opacity" onclick="document.getElementById('app-sidebar').classList.add('-translate-x-full'); this.classList.add('hidden')" aria-hidden="true">
</div>
<aside id="app-sidebar" class="fixed top-16 left-0 z-30 w-64 h-[calc(100vh-4rem)] transition-transform sidebar-flat md:translate-x-0 -translate-x-full shadow-lg md:shadow-none" aria-label="Sidebar">
  <div id="app-sidebar-scroll" class="h-full px-4 py-6 overflow-y-auto">
    <ul class="space-y-2 font-sans">
      <li>
        <a href="{% url 'data_management:dashboard' %}" class="flex items-center gap-3 px-3 py-2.5 text-text-primary rounded-xl hover:bg-surface-alt hover:text-primary-700 cursor-pointer transition-all duration-200 group">
          <svg class="w-5 h-5 text-primary-500 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
            <path d="M16.975 11H10V4.025a1 1 0 0 0-1.066-.998 8.5 8.5 0 1 0 9.039 9.039.999.999 0 0 0-1-1.066h.002Z"/>
            <path d="M12.5 0c-.157 0-.311.01-.565.027A1 1 0 0 0 11 1.02V10h8.975a1 1 0 0 0 1-.935c.013-.188.028-.374.028-.565A8.51 8.51 0 0 0 12.5 0Z"/>
          </svg>
          <span class="text-sm font-bold tracking-wide">Dashboard</span>
        </a>
      </li>
      {% if user.is_staff %}
      <li>
        <button type="button" class="flex items-center w-full gap-3 px-3 py-2.5 text-text-primary rounded-xl hover:bg-surface-alt hover:text-primary-700 cursor-pointer transition-all duration-200 group" aria-controls="dropdown-student" onclick="this.nextElementSibling.classList.toggle('hidden'); this.querySelector('svg:last-child').classList.toggle('rotate-180')" aria-expanded="false">
          <svg class="flex-shrink-0 w-5 h-5 text-primary-500 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 18 18" aria-hidden="true">
            <path d="M6.143 0H1.857A1.857 1.857 0 0 0 0 1.857v4.286C0 7.169.831 8 1.857 8h4.286A1.857 1.857 0 0 0 8 6.143V1.857A1.857 1.857 0 0 0 6.143 0Zm10 0h-4.286A1.857 1.857 0 0 0 10 1.857v4.286C10 7.169 10.831 8 11.857 8h4.286A1.857 1.857 0 0 0 18 6.143V1.857A1.857 1.857 0 0 0 16.143 0Zm-10 10H1.857A1.857 1.857 0 0 0 0 11.857v4.286C0 17.169.831 18 1.857 18h4.286A1.857 1.857 0 0 0 8 16.143v-4.286A1.857 1.857 0 0 0 6.143 10Zm10 0h-4.286A1.857 1.857 0 0 0 10 11.857v4.286c0 1.026.831 1.857 1.857 1.857h4.286A1.857 1.857 0 0 0 18 16.143v-4.286A1.857 1.857 0 0 0 16.143 10Z"/>
          </svg>
          <span class="flex-1 text-left text-sm font-bold tracking-wide">Data Mahasiswa</span>
          <svg class="w-3 h-3 text-text-muted transform transition-transform duration-200 group-hover:text-primary-600" fill="none" viewBox="0 0 10 6" aria-hidden="true">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 4 4 4-4"></path>
          </svg>
        </button>
        <ul id="dropdown-student" class="hidden py-2 space-y-1 pl-11" aria-label="Submenu Data Mahasiswa">
          <li>
            <a href="{% url 'data_management:staff_student_list' %}" class="flex items-center w-full px-3 py-2 text-sm font-medium text-text-muted rounded-lg hover:bg-primary-50 hover:text-primary-700 cursor-pointer transition-colors duration-150 relative before:content-[''] before:w-1.5 before:h-1.5 before:bg-border before:rounded-full before:absolute before:-left-3 before:transition-colors hover:before:bg-primary-500">
              Daftar Mahasiswa
            </a>
          </li>
          <li>
            <a href="{% url 'data_management:staff_student_create' %}" class="flex items-center w-full px-3 py-2 text-sm font-medium text-text-muted rounded-lg hover:bg-primary-50 hover:text-primary-700 cursor-pointer transition-colors duration-150 relative before:content-[''] before:w-1.5 before:h-1.5 before:bg-border before:rounded-full before:absolute before:-left-3 before:transition-colors hover:before:bg-primary-500">
              Tambah Mahasiswa
            </a>
          </li>
        </ul>
      </li>
      {% endif %}
    </ul>
    
    <div class="absolute bottom-6 left-4 right-4">
      <div class="p-4 bg-primary-50 rounded-2xl border border-primary-100 shadow-sm text-center">
        <p class="text-xs font-mono font-bold text-primary-600 uppercase tracking-widest">KMM Mesir</p>
        <p class="text-xs text-text-muted mt-2 font-medium">Sistem Manajemen<br>Keluarga Mahasiswa Minangkabau</p>
      </div>
    </div>
  </div>
</aside>
