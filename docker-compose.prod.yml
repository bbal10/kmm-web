services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kmm_web_db}
      POSTGRES_USER: ${POSTGRES_USER:-kmm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kmm_user} -d ${POSTGRES_DB:-kmm_web_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./
    # Using Gunicorn for production instead of Django dev server
    command: uv run gunicorn kmm_web_backend.wsgi:application --bind 0.0.0.0:8000 --workers 4
    ports:
      - "${WEB_PORT:-8080}:8000"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kmm_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kmm_web_db}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: "kmm_web_backend.settings.production"
      VITE_DEV_MODE: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: