services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kmm_web_db}
      POSTGRES_USER: ${POSTGRES_USER:-kmm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password_here}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kmm_user} -d ${POSTGRES_DB:-kmm_web_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./
    command: uv run manage.py runserver 0.0.0.0:8000 --settings=kmm_web_backend.settings.local
    volumes:
      - .:/app
      - venv_data:/app/.venv
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kmm_user}:${POSTGRES_PASSWORD:-changeme_secure_password_here}@postgres:5432/${POSTGRES_DB:-kmm_web_db}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  venv_data: