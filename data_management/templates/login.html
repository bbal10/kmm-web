{% extends 'base.html' %}
{% load static %}
{% block title %}Login - KMM Mesir{% endblock %}
{% block wrapper %}
<div class="min-h-screen flex items-center justify-center bg-bg p-4 relative overflow-hidden">
  <!-- Subtle vibrant background glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-primary-300 rounded-full blur-[100px] opacity-20 pointer-events-none"></div>
  
  <div class="w-full max-w-md motion-fade-up relative z-10">
    <div class="block-card p-8 sm:p-10 shadow-xl border-white/50 bg-white/80 backdrop-blur-xl">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-gradient-to-br from-primary-500 to-primary-600 shadow-lg shadow-primary-500/30 mx-auto flex items-center justify-center rounded-2xl mb-6">
          <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
        </div>
        <h1 class="text-3xl font-extrabold text-text-primary tracking-tight font-sans">Welcome Back</h1>
        <p class="mt-2 text-sm text-text-muted font-medium">Masuk ke sistem KMM Mesir</p>
      </div>
      
      <div id="login-form-container">
        {% include 'partials/login_form.html' %}
      </div>
    </div>
    
    <p class="text-center text-sm text-text-muted mt-8 font-medium">&copy; 2026 KMM MESIR</p>
  </div>
</div>
{% endblock wrapper %}
