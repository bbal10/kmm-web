<form id="login-form-container" class="space-y-4" method="post" hx-post="{% url 'data_management:login' %}" hx-target="#login-form-container" hx-swap="outerHTML swap:0.2s" hx-indicator="#login-spinner" _="on htmx:afterSwap if my.querySelector('.block-error-message') or my.querySelector('.border-error') my.querySelector('input').focus() end">
  {% csrf_token %}
  <div class="motion-fade-up">
    <label for="{{ form.username.id_for_label }}" class="block-label">Username</label>
    <input id="{{ form.username.id_for_label }}" name="{{ form.username.name }}" type="text" required class="block-input" placeholder="Masukkan username" aria-describedby="username-help" autocomplete="username">
    {% if form.username.errors %}
    <p class="block-error-message" role="alert" id="username-error">{{ form.username.errors.0 }}</p>
    {% endif %}
  </div>
  <div class="motion-fade-up">
    <label for="{{ form.password.id_for_label }}" class="block-label">Password</label>
    <input id="{{ form.password.id_for_label }}" name="{{ form.password.name }}" type="password" required class="block-input" placeholder="Masukkan password" aria-describedby="password-help" autocomplete="current-password">
    {% if form.password.errors %}
    <p class="block-error-message" role="alert" id="password-error">{{ form.password.errors.0 }}</p>
    {% endif %}
  </div>
  {% if form.non_field_errors %}
  <div class="border-l-4 border-error bg-error-light px-4 py-3 motion-fade-up" role="alert">
    <p class="text-sm font-semibold text-error-dark">{{ form.non_field_errors.0 }}</p>
  </div>
  {% endif %}
  <button type="submit" class="block-btn-cta w-full py-2.5 text-sm font-bold relative motion-press">
    <svg id="login-spinner" class="htmx-indicator h-4 w-4 text-white animate-spin absolute left-3 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <span class="htmx-indicator:hidden">LOGIN</span>
  </button>
  <hr class="block-divider">
  <div class="text-center text-sm space-y-1">
    <a href="{% url 'data_management:register' %}" class="font-semibold text-primary-600 hover:text-primary-700 cursor-pointer transition-colors duration-150 block">
      Belum punya akun? Daftar
    </a>
    <a href="{% url 'data_management:staff_login' %}" class="font-semibold text-text-muted hover:text-text-primary cursor-pointer transition-colors duration-150 block">
      Login sebagai Staff
    </a>
  </div>
</form>
